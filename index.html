<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TUTall — Premium academic AI tutoring, study planning, and progress analytics for STEM learners.">
  <title>TUTall — Academic AI Tutoring Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="page-shell">
  <div id="silk-canvas" class="silk-canvas" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="topbar glass-panel" role="banner">
      <div class="brand-group">
        <span class="brand-mark" aria-hidden="true">T</span>
        <div>
          <p class="brand-eyebrow">TUTall Academic Studio</p>
          <p class="brand-title">AI tutoring for focused study.</p>
        </div>
      </div>
      <button id="navigationToggle" class="nav-toggle" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <div class="layout-shell">
      <aside class="sidebar glass-panel" id="sidebar" aria-label="Primary navigation">
        <div class="sidebar-section">
          <p class="sidebar-label">Workspace</p>
          <nav class="nav-list" role="menubar" aria-label="Main navigation">
            <button class="nav-link active" data-route="home" role="menuitem">Home</button>
            <button class="nav-link" data-route="dashboard" role="menuitem">Dashboard</button>
            <button class="nav-link" data-route="tutor" role="menuitem">Tutor</button>
            <button class="nav-link" data-route="planner" role="menuitem">Study Planner</button>
            <button class="nav-link" data-route="calendar" role="menuitem">Calendar</button>
            <button class="nav-link" data-route="profile" role="menuitem">Profile</button>
            <button class="nav-link" data-route="settings" role="menuitem">Settings</button>
          </nav>
        </div>
        <div class="sidebar-section sidebar-summary">
          <div class="summary-card">
            <span class="summary-label">Study streak</span>
            <strong>5 days</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">Mastery</span>
            <strong>82%</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">Focus index</span>
            <strong>+14%</strong>
          </div>
        </div>
      </aside>

      <main class="content-shell" id="route-container" tabindex="0">
        <!-- Route content is rendered here -->
      </main>
    </div>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <div id="route-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="./silk.js"></script>
  <script src="./app.js"></script>
</body>
</html>
