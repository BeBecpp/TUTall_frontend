<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var path = window.location.pathname;
      var match = path.match(/^(.*\/TUTall_frontend)\/?/i);
      if (match) {
        var base = document.createElement("base");
        base.href = match[1] + "/";
        document.head.appendChild(base);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TUTall Scholarship Readiness — Mock calculator for FGLI grant and equity support.">
  <title>TUTall Scholarship Readiness</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-[#122634] text-[#e3e3e3] antialiased">
  <div id="toast-container"></div>
  <nav id="navbar" class="navbar fixed top-0 left-0 right-0 z-50 bg-[#102430]/90 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="./index.html" class="flex items-center gap-2 shrink-0">
          <div class="w-9 h-9 rounded-xl bg-[#456882] flex items-center justify-center text-white font-bold text-base">T</div>
          <span class="text-white font-bold text-lg">TUTall</span>
        </a>
        <div class="hidden lg:flex items-center gap-1 nav-scroll overflow-x-auto">
          <a href="./index.html" class="nav-link">Home</a>
          <a href="./dashboard.html" class="nav-link">Dashboard</a>
          <a href="./quiz.html" class="nav-link">Quiz</a>
          <a href="./study-plan.html" class="nav-link">Study Plan</a>
          <a href="./scholarships.html" class="nav-link">Scholarships</a>
        </div>
        <button id="mobile-menu-toggle" class="lg:hidden text-white p-2 rounded-lg hover:bg-white/10" aria-label="Toggle menu">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
      </div>
      <div id="mobile-menu" class="mobile-menu lg:hidden pb-4">
        <div class="flex flex-col gap-1">
          <a href="./index.html" class="nav-link">Home</a>
          <a href="./dashboard.html" class="nav-link">Dashboard</a>
          <a href="./quiz.html" class="nav-link">Quiz</a>
          <a href="./study-plan.html" class="nav-link">Study Plan</a>
          <a href="./scholarships.html" class="nav-link">Scholarships</a>
        </div>
      </div>
    </div>
  </nav>
  <main class="pt-20">
    <section class="section-padding bg-[#122b40] min-h-screen">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="text-center mb-10">
          <p class="text-[#8db5ce] uppercase tracking-[0.24em] text-sm mb-2">Scholarship readiness</p>
          <h1 class="text-4xl sm:text-5xl font-bold text-white">Mock equity grant recommendations for FGLI students.</h1>
          <p class="mt-4 text-[#c9ced7] max-w-3xl mx-auto">Use the calculator to assess first-generation, financial assistance, and academic readiness in a frontend-only demo.</p>
        </div>

        <div class="glass-card p-8 mb-10">
          <div class="grid lg:grid-cols-3 gap-4 mb-6">
            <div>
              <label class="form-label" for="sch-grade">Grade Level</label>
              <input type="text" id="sch-grade" class="form-input" value="11" placeholder="Grade level">
            </div>
            <div>
              <label class="form-label" for="sch-gpa">GPA</label>
              <input type="number" id="sch-gpa" class="form-input" value="3.8" step="0.1" min="0" max="4">
            </div>
            <div>
              <label class="form-label" for="sch-country">Country</label>
              <input type="text" id="sch-country" class="form-input" value="Mongolia" placeholder="Country">
            </div>
            <div>
              <label class="form-label" for="sch-major">Intended Major</label>
              <input type="text" id="sch-major" class="form-input" value="Computer Science" placeholder="Intended major">
            </div>
            <div>
              <label class="form-label" for="sch-english">English Level</label>
              <input type="text" id="sch-english" class="form-input" value="B2" placeholder="English level">
            </div>
            <div>
              <label class="form-label" for="sch-need">Financial Need</label>
              <select id="sch-need" class="form-input">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high" selected>High</option>
              </select>
            </div>
          </div>
          <div class="grid lg:grid-cols-2 gap-6 mb-6">
            <div class="space-y-4">
              <label class="form-label" for="sch-first-gen">First-Generation Status</label>
              <select id="sch-first-gen" class="form-input">
                <option value="no">No</option>
                <option value="yes" selected>Yes</option>
              </select>
              <label class="form-label" for="sch-finance">Financial Assistance Required</label>
              <select id="sch-finance" class="form-input">
                <option value="no">No</option>
                <option value="yes" selected>Yes</option>
              </select>
            </div>
            <div class="space-y-4">
              <div>
                <label class="form-label" for="sch-activities">Activities</label>
                <textarea id="sch-activities" class="form-input" rows="3">Hackathons, coding club, volunteer teaching</textarea>
              </div>
              <div class="grid sm:grid-cols-2 gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" id="sch-essay" class="w-4 h-4 rounded text-[#456882]" checked>
                  <span class="text-[#c9ced7] text-sm">Has essay ready</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" id="sch-english-test" class="w-4 h-4 rounded text-[#456882]" checked>
                  <span class="text-[#c9ced7] text-sm">Has English test score</span>
                </label>
              </div>
            </div>
          </div>
          <button id="btn-scholarship" class="btn-primary">Calculate Scholarship Readiness</button>
        </div>

        <div id="scholarship-result"></div>
      </div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
